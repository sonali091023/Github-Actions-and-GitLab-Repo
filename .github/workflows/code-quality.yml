#Here we will do linting [For that we use flake8] and SAST [for this we use Bandit] scan 
name: Code Quality

on:
    workflow_call:

jobs:
  validate:
    runs-on: ubuntu-latest

    strategy:
      #fail-fast: true --> if the execution fails for any of the below version then execution will get stop for further versions OR simply further execution will get stop
      #fail-fast: false --> if the execution fails for any of the below version then that failure will get ignore simply and excution will continue for the next version
      fail-fast: false  
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

        #depencency will be same for all python versions  
      - name: install dependencies
        run: pip install -r requirements.txt

      - name: run linter
        run: flake8 app.py

      - name: run SAST
        run: bandit -r app.py
