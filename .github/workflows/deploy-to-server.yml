# this will deploy the safe / secure / tested app to Prod server
name: Deploy To Server

on: 
    workflow_call:


jobs:
    deploy:
        runs-on: ubuntu-latest
        env:
            DOCKERHUBUSER: ${{ vars.DOCKERHUBUSER }}
            DOCKERTAG: ${{ github.sha }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: SSH to Prod server & create app folder
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                script: |
                 echo "Installing required packages & folders"
                 sudo apt-get update && sudo apt-get install docker.io docker-compose-v2 -y
                 sudo usermod -aG docker $USER
                 mkdir -p devops

            - name: Copy the docker-compose file
              uses: appleboy/scp-action@v1
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                source: docker-compose.yml
                target: ~/devops
                
            - name: SSH to Prod server & run the app
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                script: |
                 echo "Running App"
                
                 export DOCKERHUBUSER=${{ vars.DOCKERHUBUSER }}
                 export DOCKERTAG=${{ github.sha }}
                 echo ${{ secrets.DOCKERHUBTOKEN }} | docker login --username ${{ vars.DOCKERHUBUSER }} --password-stdin
                 cd ~/devops && docker compose down && docker compose up -d --build --force-recreate --pull always