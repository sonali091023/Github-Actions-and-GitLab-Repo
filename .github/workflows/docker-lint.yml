#Scan the Dockerfile for issues and common vulnerabilities and exposures [CVEs]
name: Docker Lint

on: 
    workflow_call:
jobs:
    validate-dockerfile:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            
            - name: Validate Dokerfile
              uses: hadolint/hadolint-action@v3.1.0
              with:
                dockerfile: Dockerfile
            