# This is the name of the workflow that will be displayed in the actions tab
name: CICD
on: 

#manual click [deliver] workflow whenever user needs
  workflow_dispatch: 
    inputs:
      environment: 
        description: This is the environment where this workflow runs
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
jobs:
  code: 
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "Code clone from the github"

  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build docker container
        run: echo "Docker container build"

  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Test the container
        run: echo "Testing the container"

  deploy:
    if: inputs.environment=='dev'
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the app
        run: echo "Docker compose deployed the app"
