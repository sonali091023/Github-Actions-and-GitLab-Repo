#Uses Trivy image scanner to scan the images for the issues and vulnerabilities in the Dockerhub
#What does trivy do?-->It keeps database with itself of the CVEs [Common vulnerabilities and Exposures], So based on that Trivy gives the ratings as Critical: dangerous, High: High but solution is available, Medium: Its ok, low: can ignore
#So if trivy scans atleast one Critical issue at the time only exection should get stop
name: Image Scan

on: 
    workflow_call:

jobs:
    image-scanner:
        runs-on: ubuntu-latest
        steps:

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                username: ${{ vars.DOCKERHUBUSER }}
                password: ${{ secrets.DOCKERHUBTOKEN }}
            
            - name: Trivy Scanner
              uses: aquasecurity/trivy-action@0.35.0
              with: 
                image-ref: ${{ vars.DOCKERHUBUSER }}/github-actions-app:${{ github.sha}}
                severity: 'CRITICAL, HIGH'
                exit-code: '1'


